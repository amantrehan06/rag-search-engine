# Server
server.port=${PORT:8080}

# Logging
logging.level.com.productsearch=DEBUG
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Pinecone
pinecone.index.name=at-ai-lab-index-openai-3-small

# Hybrid retrieval — 1 = single dense search (no LLM expansion), N>1 = LLM-expanded fan-out
search.query_variations=3

# OpenAI per-pipeline-step. Format: <model>:<temperature>. Omitting ':<temp>' defaults to 0.0.
# Override individually via env vars (OPENAI_MODEL_INTENT, OPENAI_MODEL_EXPANSION, etc).
openai.model.intent=gpt-4o-mini:0.0
openai.model.expansion=gpt-4o-mini:0.7
openai.model.reranker=gpt-4o-mini:0.0
openai.model.judge=gpt-4o-mini:0.0
openai.model.catalog=gpt-4o-mini:0.7

# OpenAI embedding model (used by ingestion + query embedding for Pinecone). No temperature.
openai.model.embedding=text-embedding-3-small
