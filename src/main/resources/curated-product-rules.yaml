# ================================================================
# curated-product-rules.yaml
# SOURCE OF TRUTH for CatalogGenerationService
#
# Structure: 5 categories × ~50 products each = 250 products
# 3 brands per category, mix of models and variants
# Real products, real prices, real attributes
#
# Each product entry produces one record per variant label.
# ================================================================

categories:
  - id: audio
    name: Audio
  - id: footwear
    name: Footwear
  - id: furniture
    name: Furniture
  - id: laptops
    name: Laptops
  - id: fitness
    name: Fitness

brands:
  SONY:       { name: Sony,         category: audio }
  BOSE:       { name: Bose,         category: audio }
  JABRA:      { name: Jabra,        category: audio }
  NIKE:       { name: Nike,         category: footwear }
  ASICS:      { name: ASICS,        category: footwear }
  NEWBALANCE: { name: New Balance,  category: footwear }
  IKEA:       { name: IKEA,         category: furniture }
  ARTICLE:    { name: Article,      category: furniture }
  STRUCTUBE:  { name: Structube,    category: furniture }
  APPLE:      { name: Apple,        category: laptops }
  DELL:       { name: Dell,         category: laptops }
  LENOVO:     { name: Lenovo,       category: laptops }
  PELOTON:    { name: Peloton,      category: fitness }
  GARMIN:     { name: Garmin,       category: fitness }
  THERAGUN:   { name: Theragun,     category: fitness }

